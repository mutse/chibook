name: chibook
description: Cross-platform AI reading app inspired by WeRead.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  file_picker: ^8.0.6
  path_provider: ^2.1.4
  sqflite: ^2.3.3+1
  path: ^1.9.0
  uuid: ^4.4.2
  flutter_tts: ^4.0.2
  http: ^1.2.2
  crypto: ^3.0.6
  shared_preferences: ^2.3.2
  audioplayers: ^6.1.0
  epub_plus: ^5.0.0
  flutter_html: ^3.0.0-beta.2
  syncfusion_flutter_pdf: ^27.1.48
  syncfusion_flutter_pdfviewer: ^27.1.48

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
